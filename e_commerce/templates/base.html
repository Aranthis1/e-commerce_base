{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mi E-Commerce{% endblock %}</title>
    <link rel="stylesheet" href="../static/CSS/styles.css">
</head>
<body>

    <nav class="navbar">
            <a href="{% url 'product_list' %}">Catálogo</a>
            <a href="{% url 'product_create' %}" class="btn btn-success">Nuevo Producto</a>
        </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert {{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
