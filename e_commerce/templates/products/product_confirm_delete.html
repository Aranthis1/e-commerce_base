<h1>Eliminar Producto</h1>

<p>¿Estás seguro de que deseas eliminar el producto "<strong>{{ product.name }}</strong>"? Esta acción no se puede deshacer.</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit">Sí, eliminar</button>
    <a href="{% url 'product_list' %}">Cancelar</a>
</form>
