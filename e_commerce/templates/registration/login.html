{% extends 'base.html' %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; margin-top: 50px;">
    <div class="form-box" style="width: 100%; max-width: 400px; padding: 40px; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <h2 style="text-align: center; color: #2c3e50; margin-bottom: 20px;">Iniciar Sesión</h2>
        
        <form method="post">
            {% csrf_token %}
            
            {% if form.errors %}
                <p style="color: #e74c3c; text-align: center; margin-bottom: 15px; font-weight: bold;">Usuario o contraseña incorrectos.</p>
            {% endif %}

            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; color: #666;">Usuario:</label>
                <input type="text" name="username" class="form-control" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;" required>
            </div>
            
            <div style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 5px; color: #666;">Contraseña:</label>
                <input type="password" name="password" class="form-control" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;" required>
            </div>
            
            <button type="submit" class="btn btn-success" style="width: 100%; padding: 12px; font-size: 1.1rem;">Entrar</button>
        </form>
    </div>
</div>
{% endblock %}
